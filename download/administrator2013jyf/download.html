<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制台</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .main-card {
            width: 90%;
            max-width: 700px;
            text-align: center; /* 确保内部元素居中 */
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .content-box {
            text-align: left; /* 文件内容保持左对齐方便阅读 */
            background: #2d3436;
            color: #dfe6e9;
            padding: 20px;
            border-radius: 8px;
            font-family: "Consolas", monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 100px;
            border: 1px solid #636e72;
        }

        .loading-text {
            color: #b2bec3;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>欢迎回来，管理员</h1>
    
    <p class="subtitle">以下是网页文件列表：</p>

    <div id="file-content" class="content-box">
        <span class="loading-text">正在读取数据...</span>
    </div>
</div>

<script>
    // 定义读取路径
    const filePath = './file_list.txt';

    async function loadTxtFile() {
        const container = document.getElementById('file-content');
        try {
            // 使用 cache: "no-cache" 确保每次都能读取到 GitHub 上的最新内容
            const response = await fetch(filePath, { cache: "no-cache" });
            
            if (response.ok) {
                const text = await response.text();
                container.textContent = text;
            } else {
                container.innerHTML = `<span style="color: #ff7675;">无法找到文件 (${response.status})</span>`;
            }
        } catch (error) {
            container.innerHTML = `<span style="color: #ff7675;">读取出错: ${error.message}</span>`;
        }
    }

    // 执行函数
    loadTxtFile();
</script>

</body>
</html>
