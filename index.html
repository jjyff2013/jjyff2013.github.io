<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jyf下载站</title>
    <style>
        /* 基础样式设置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 让内容在屏幕垂直居中 */
            min-height: 100vh;       /* 填满视口高度 */
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }

        /* 输入框区域 */
        .login-section {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-section p { 
            font-size: 14px; 
            color: #888; 
            margin-bottom: 20px;
        }

        input {
            width: 88%; /* 统一宽度，使其与按钮对齐 */
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #28a745; /* 聚焦时变成绿色边框 */
        }

        .btn-go {
            width: 88%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-go:active {
            transform: scale(0.98);
            background: #218838;
        }
    </style>
</head>
<body>
    <h1>文件下载站</h1>
    <div class="login-section">
        <p> 输入密码以下载文件 </p>
        <input type="text" id="passInput" placeholder="please input the password">
        <button class="btn-go" onclick="goToPrivate()">ok</button>
    </div>

    <script>
        function goToPrivate() {
            const pwd = document.getElementById('passInput').value;
            if (pwd) {
                // 跳转逻辑：输入 xxx 跳转到 download/xxx/download.html
                window.location.href = "download/" + pwd + "/download.html";
            } else {
                alert("please input the password");
            }
        }
    </script>

</body>
</html>
